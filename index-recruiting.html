<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>CCU Recruiting Co-Pilot</title><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#060D1A;}</style></head><body><div id="root"></div><script type="text/babel">const {useState,useEffect,useRef,useCallback}=React;
/**
 * CCU RECRUITING CO-PILOT — LIVE VERSION
 * Connected to real Firebase backend via REST API
 * Set BACKEND_URL to your deployed server URL
 */


// ── CONFIG — change this to your deployed backend URL ──────────────────────
const BACKEND_URL = "https://ccu-backend-production.up.railway.app";
// After deploying to Railway/Render, replace the URL above.
// For local dev: "http://localhost:3001"

// ─── BRAND ────────────────────────────────────────────────────────────────────
const C = {
  navy:"#0B1F3A", navyMid:"#0F2850", gold:"#C9A84C", dark:"#060D1A",
  surface:"#0D2040", surf2:"#112448", surf3:"#162A52",
  text:"#EEE9E0", muted:"#7A9BBF",
  green:"#10B981", red:"#E05252", amber:"#F59E0B", purple:"#8B5CF6", blue:"#3B82F6",
};

const MARKETS = {
  "Phoenix Core":              { color:C.blue,    target:600 },
  "Scottsdale":                { color:C.gold,    target:200 },
  "Mesa / Gilbert / Chandler": { color:C.green,   target:300 },
  "Glendale / Peoria":         { color:C.amber,   target:200 },
  "Tempe / Ahwatukee":         { color:C.purple,  target:150 },
  "East Valley":               { color:"#EC4899", target:150 },
  "Tucson":                    { color:"#14B8A6", target:200 },
  "Flagstaff / N. AZ":         { color:"#6366F1", target:100 },
  "Prescott / Yavapai":        { color:"#F97316", target:100 },
};

const STAGES = ["Applied","Screened","Interview","Offer","Hired","No Show"];
const SC = { Applied:C.blue, Screened:C.purple, Interview:C.amber, Offer:C.gold, Hired:C.green, "No Show":"#6B7280" };
const TIER_COLORS = { HOT:C.red, WARM:C.amber, NURTURE:C.purple, REJECT:"#6B7280", PENDING:C.muted };

const TABS = [
  {id:"copilot",  label:"Co-Pilot",  icon:"🤖"},
  {id:"pipeline", label:"Pipeline",  icon:"📊"},
  {id:"markets",  label:"Markets",   icon:"🗺️"},
  {id:"content",  label:"Content",   icon:"✍️"},
  {id:"sprint",   label:"Sprint",    icon:"🏃"},
  {id:"followup", label:"Follow-Up", icon:"💬"},
  {id:"reports",  label:"Reports",   icon:"📈"},
];

const CONTENT_TYPES = {
  jobpost:   {label:"Job Post",           icon:"📢"},
  tiktok:    {label:"TikTok Script",      icon:"🎬"},
  sms:       {label:"SMS Sequence",       icon:"💬"},
  email:     {label:"Email Sequence",     icon:"✉️"},
  sprint:    {label:"Sprint Script",      icon:"🏃"},
  objection: {label:"Objection Handlers", icon:"🛡️"},
};

// ─── API helpers ──────────────────────────────────────────────────────────────
const api = {
  get:   (path) => fetch(`${BACKEND_URL}${path}`).then(r=>r.json()),
  patch: (path,body) => fetch(`${BACKEND_URL}${path}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()),
  post:  (path,body) => fetch(`${BACKEND_URL}${path}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()),
};

async function callAI(prompt, system="", maxTokens=1000) {
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6", max_tokens:maxTokens,
      ...(system ? {system} : {}),
      messages:[{role:"user",content:prompt}],
    }),
  });
  const d = await res.json();
  return d.content?.find(b=>b.type==="text")?.text || "Error — try again.";
}

const pct = (n,d) => d ? Math.round(n/d*100) : 0;
const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const fmtDate = ts => ts ? new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "—";

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState("copilot");
  const [applicants, setApplicants] = useState([]);
  const [stats, setStats]           = useState({total:0,screened:0,interviewed:0,hired:0,noShows:0,hot:0,byMarket:{},bySource:{},byStage:{}});
  const [loading, setLoading]       = useState(true);
  const [connected, setConnected]   = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);

  const [selectedApp, setSelectedApp]   = useState(null);
  const [filterStage, setFilterStage]   = useState("All");
  const [filterMarket, setFilterMarket] = useState("All");

  const [plan, setPlan]         = useState(null);
  const [planLoading, setPlanLoading] = useState(false);
  const [chat, setChat]         = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const chatRef = useRef(null);

  const [contentType, setContentType]       = useState("jobpost");
  const [contentMarket, setContentMarket]   = useState("Phoenix Core");
  const [contentPlatform, setContentPlatform] = useState("facebook");
  const [generated, setGenerated]           = useState("");
  const [generating, setGenerating]         = useState(false);
  const [copied, setCopied]                 = useState(false);

  const [sprintActive, setSprintActive] = useState(false);
  const [sprintStep, setSprintStep]     = useState(0);
  const [sprintSecs, setSprintSecs]     = useState(600);
  const sprintRef = useRef(null);

  const [reportText, setReportText]     = useState("");
  const [reportLoading, setReportLoading] = useState(false);

  const [addForm, setAddForm]   = useState(false);
  const [newApp, setNewApp]     = useState({name:"",phone:"",market:"Phoenix Core",source:"Manual Entry"});

  // ── Data loading ─────────────────────────────────────────────────────────
  const loadData = useCallback(async () => {
    try {
      const [appsRes, statsRes] = await Promise.all([
        api.get("/api/applicants"),
        api.get("/api/stats"),
      ]);
      setApplicants(appsRes.applicants || []);
      setStats(statsRes);
      setConnected(true);
      setLastRefresh(new Date());
    } catch {
      setConnected(false);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  // Auto-refresh every 30 seconds
  useEffect(() => {
    const t = setInterval(loadData, 30000);
    return () => clearInterval(t);
  }, [loadData]);

  // ── Sprint timer ──────────────────────────────────────────────────────────
  useEffect(() => {
    if (sprintActive && sprintSecs > 0) {
      sprintRef.current = setTimeout(() => setSprintSecs(s=>s-1), 1000);
    } else if (sprintSecs === 0) setSprintActive(false);
    return () => clearTimeout(sprintRef.current);
  }, [sprintActive, sprintSecs]);

  // ── Chat scroll ───────────────────────────────────────────────────────────
  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [chat]);

  // ── Pipeline filters ──────────────────────────────────────────────────────
  const filtered = applicants.filter(a => {
    if (filterStage !== "All" && a.stage !== filterStage) return false;
    if (filterMarket !== "All" && a.market !== filterMarket) return false;
    return true;
  });

  const marketData = Object.entries(MARKETS).map(([m,info]) => ({
    market: m, ...info,
    count:  stats.byMarket?.[m] || 0,
    hired:  applicants.filter(a=>a.market===m&&a.stage==="Hired").length,
    pctTarget: pct(stats.byMarket?.[m]||0, info.target),
  }));

  const thinMarkets = marketData.filter(m=>m.pctTarget<30);
  const hotApps     = applicants.filter(a=>a.tier==="HOT"&&a.stage==="Applied");

  // ── Stage move ────────────────────────────────────────────────────────────
  async function moveStage(id, stage) {
    await api.patch(`/api/applicants/${id}`, {stage});
    setApplicants(prev=>prev.map(a=>a.id===id?{...a,stage}:a));
    setSelectedApp(prev=>prev?.id===id?{...prev,stage}:prev);
    loadData();
  }

  // ── Manual add ────────────────────────────────────────────────────────────
  async function addApplicant() {
    if (!newApp.name || !newApp.phone) return;
    await api.post("/api/applicants", newApp);
    setNewApp({name:"",phone:"",market:"Phoenix Core",source:"Manual Entry"});
    setAddForm(false);
    loadData();
  }

  // ── Co-Pilot plan ─────────────────────────────────────────────────────────
  async function generatePlan() {
    setPlanLoading(true); setPlan(null);
    const thin = thinMarkets.map(m=>m.market).join(", ") || "none";
    const text = await callAI(
      `You are the recruiting co-pilot for Certified Contracting LLC, Arizona's Finest roofing company. Analyze this LIVE pipeline data and give Xavier a direct weekly action plan.

LIVE DATA:
- Total applicants: ${stats.total} (target: 2000/month)
- Screened: ${stats.screened} | Interviewed: ${stats.interviewed} | Hired: ${stats.hired} | No Shows: ${stats.noShows}
- HOT applicants awaiting call: ${stats.hot}
- Screen rate: ${pct(stats.screened,stats.total)}% | Hire rate: ${pct(stats.hired,stats.interviewed)}%
- Thin markets (under 30% target): ${thin}
- Top source: ${Object.entries(stats.bySource||{}).sort((a,b)=>b[1]-a[1])[0]?.[0] || "unknown"}

Format exactly:
PIPELINE HEALTH: [one sentence]

THIS WEEK (numbered, max 6, specific):
1.
2.
3.
4.
5.
6.

AD SPEND: [exact $ and platforms]
BIGGEST RISK: [one sentence]
CALL NOW: [any HOT applicants to call immediately — names if available]`,
    "", 700);
    setPlan(text);
    setPlanLoading(false);
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  async function sendChat() {
    if (!chatInput.trim() || chatLoading) return;
    const msg = chatInput.trim();
    setChatInput("");
    setChatLoading(true);
    setChat(prev=>[...prev,{role:"user",text:msg}]);
    const history = chat.slice(-8).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:500,
        system:`You are the recruiting co-pilot for Certified Contracting LLC (Arizona's Finest roofing). Xavier Medina is the founder. LIVE pipeline: ${stats.total} applicants, ${stats.hired} hired, ${stats.hot} HOT leads. Thin markets: ${thinMarkets.map(m=>m.market).join(",")||"none"}. Be direct, specific, no fluff.`,
        messages:[...history,{role:"user",content:msg}],
      }),
    });
    const d = await res.json();
    setChat(prev=>[...prev,{role:"ai",text:d.content?.[0]?.text||"Error"}]);
    setChatLoading(false);
  }

  // ── Content gen ───────────────────────────────────────────────────────────
  async function generateContent() {
    setGenerating(true); setGenerated("");
    const prompts = {
      jobpost:`Write a Facebook job post for a 1099 D2D roofing sales rep in ${contentMarket}, Arizona. Arizona's Finest roofing company. $800-$2,500/deal, $10K-$20K/month top reps. No experience needed. Apply: certifiedcontractingaz.com/apply. Never open with company name. No competitors. Strong CTA. Output ONLY the post.`,
      tiktok:`Write a TikTok script recruiting D2D roofing sales reps in ${contentMarket} AZ. Format: [HOOK 3 sec], [BODY 30-45 sec], [CTA 5 sec]. Income: $10K-$20K/month. No experience needed. Raw and authentic. Xavier is on camera. Output ONLY the script.`,
      sms:`Write a 4-touch SMS recruiting sequence for ${contentMarket} AZ roofing sales applicants. Touch 1 (0-5 min), Touch 2 (2hr no response), Touch 3 (Day 3), Touch 4 (Day 7). Under 160 chars each. No company name in openers. STOP opt-out on Touch 2+. Output ONLY the 4 texts.`,
      email:`Write a 3-email recruiting sequence for ${contentMarket} AZ D2D roofing applicants. Email 1: immediate follow-up. Email 2: Day 3 experience objection. Email 3: Day 7 last chance. Sign as Xavier, Certified Contracting LLC, Arizona's Finest, (480) 901-0939. Output ONLY the 3 emails.`,
      sprint:`Write a sprint recruiting game script for Xavier to run with his AZ roofing sales team. Step 1: 25-name sprint ($100 cash). Step 2: group text blast ($100 cash). Step 3: show-up bonus ($200). Include exact words Xavier says and the group text script. Output ONLY the script.`,
      objection:`Write 5 objection handler scripts for D2D roofing sales recruiting in AZ. Cover: "Is this a pyramid scheme?", "I don't have experience", "Commission only is risky", "I already have a job", "How much can I really make?". Real numbers: $800-$2,500/deal, $10K-$20K/month top reps. Output ONLY the handlers.`,
    };
    const text = await callAI(prompts[contentType]||prompts.jobpost, "", 1000);
    setGenerated(text);
    setGenerating(false);
  }

  // ── Weekly report ─────────────────────────────────────────────────────────
  async function generateReport() {
    setReportLoading(true); setReportText("");
    const byMarket = Object.entries(stats.byMarket||{}).map(([m,n])=>`${m}:${n}`).join("|");
    const text = await callAI(
      `Generate a weekly recruiting report for Certified Contracting LLC (Arizona's Finest). Direct executive summary Xavier reads Monday morning.

LIVE DATA: Total:${stats.total}/2000 target | Screened:${stats.screened} | Interviewed:${stats.interviewed} | Hired:${stats.hired} | No Shows:${stats.noShows} | HOT leads:${stats.hot}
By market: ${byMarket}

Format: WEEK IN REVIEW | NUMBERS THAT MATTER | WHAT'S WORKING | WHAT'S BROKEN | THIS WEEK'S SINGLE PRIORITY | MARKET SPOTLIGHT
Be direct. Under 2 min read.`,
    "", 600);
    setReportText(text);
    setReportLoading(false);
  }

  // ── Styles ─────────────────────────────────────────────────────────────────
  const S = {
    app: {minHeight:"100vh",background:C.dark,color:C.text,fontFamily:"'Inter',system-ui,sans-serif",fontSize:14},
    header: {background:C.navy,borderBottom:`2px solid ${C.gold}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"},
    nav: {background:C.navy,borderBottom:`1px solid ${C.surf3}`,display:"flex",overflowX:"auto"},
    page: {padding:"20px",maxWidth:1140,margin:"0 auto"},
    card: (extra={}) => ({background:C.surface,borderRadius:12,padding:"18px",...extra}),
    cardB: (color,extra={}) => ({background:C.surface,borderRadius:12,padding:"18px",border:`1px solid ${color}33`,...extra}),
    label: {fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6},
    btn: (bg=C.gold,extra={}) => ({padding:"9px 18px",borderRadius:8,border:"none",background:bg,color:bg===C.gold?C.navy:C.text,fontWeight:700,fontSize:13,cursor:"pointer",...extra}),
    btnO: (color=C.gold,extra={}) => ({padding:"8px 16px",borderRadius:8,border:`1px solid ${color}`,background:"none",color,fontWeight:700,fontSize:13,cursor:"pointer",...extra}),
    input: {width:"100%",padding:"9px 14px",borderRadius:8,border:`1px solid ${C.surf3}`,background:C.surf2,color:C.text,fontSize:13,outline:"none",boxSizing:"border-box"},
    pill: (color) => ({padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:700,background:`${color}22`,color}),
    grid: (cols,extra={}) => ({display:"grid",gridTemplateColumns:cols,gap:14,...extra}),
    bar: (val,color,h=5) => (
      <div style={{height:h,background:C.surf3,borderRadius:h,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(val,100)}%`,background:color,borderRadius:h,transition:"width 0.4s"}}/>
      </div>
    ),
  };

  const Chip = ({label,active,color,onClick}) => (
    <button onClick={onClick} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${active?color:C.surf3}`,background:active?`${color}22`:"none",color:active?color:C.muted,cursor:"pointer",fontSize:11,fontWeight:active?700:400}}>
      {label}
    </button>
  );

  const StatCard = ({label,val,color,sub}) => (
    <div style={{...S.card(),borderLeft:`4px solid ${color}`}}>
      <div style={S.label}>{label}</div>
      <div style={{fontSize:36,fontWeight:900,color,lineHeight:1}}>{val}</div>
      {sub && <div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );

  // ── Connection banner ────────────────────────────────────────────────────
  const ConnBanner = () => (
    !connected && !loading ? (
      <div style={{background:`${C.amber}22`,border:`1px solid ${C.amber}`,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:13,color:C.amber,display:"flex",alignItems:"center",gap:10}}>
        <span>⚠️</span>
        <span>Backend not connected. Set <strong>BACKEND_URL</strong> to your deployed server. Showing cached data.</span>
      </div>
    ) : null
  );

  if (loading) return (
    <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>🤖</div>
      <div style={{fontSize:20,fontWeight:800,color:C.gold}}>CCU Co-Pilot</div>
      <div style={{fontSize:13,color:C.muted}}>Connecting to live pipeline...</div>
    </div>
  );

  return (
    <div style={S.app}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,background:C.gold,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:C.navy,fontSize:18,flexShrink:0}}>C</div>
          <div>
            <div style={{fontWeight:800,fontSize:14,letterSpacing:"0.02em"}}>CERTIFIED CONTRACTING</div>
            <div style={{fontSize:10,color:C.gold,letterSpacing:"0.12em",textTransform:"uppercase"}}>Recruiting Co-Pilot · Live</div>
          </div>
        </div>
        <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          {[{l:"Pipeline",v:stats.total,c:C.gold},{l:"HOT Leads",v:stats.hot,c:C.red},{l:"Hired",v:stats.hired,c:C.green},{l:"No Shows",v:stats.noShows,c:C.muted}].map(({l,v,c})=>(
            <div key={l} style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</div>
              <div style={{fontSize:18,fontWeight:900,color:c}}>{v}</div>
            </div>
          ))}
          <div style={{...S.pill(connected?C.green:C.amber),fontSize:11,padding:"4px 10px"}}>
            {connected ? `● Live · ${lastRefresh?.toLocaleTimeString([]  ,{hour:"2-digit",minute:"2-digit"})}` : "● Offline"}
          </div>
        </div>
      </div>

      {/* NAV */}
      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 18px",background:"none",border:"none",cursor:"pointer",color:tab===t.id?C.gold:C.muted,fontWeight:tab===t.id?700:400,fontSize:12,borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      <div style={S.page}>
        <ConnBanner/>

        {/* HOT LEADS ALERT */}
        {hotApps.length > 0 && (
          <div style={{background:`${C.red}18`,border:`1px solid ${C.red}44`,borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:20}}>🔥</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:C.red,fontSize:13}}>HOT LEADS — CALL NOW</div>
              <div style={{fontSize:12,color:C.muted}}>{hotApps.map(a=>a.name).join(", ")} scored 9–10. Every hour you wait, conversion drops.</div>
            </div>
            <button onClick={()=>{setFilterStage("Applied");setTab("pipeline");}} style={S.btn(C.red,{fontSize:12})}>View →</button>
          </div>
        )}

        {/* ══ CO-PILOT ══ */}
        {tab==="copilot" && (
          <div style={S.grid("1fr 1fr")}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>🤖 Weekly Action Plan</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Reads your live pipeline and tells you exactly what to do this week.</div>
              </div>
              <div style={S.grid("repeat(2,1fr)",{gap:10})}>
                {[{l:"Monthly Progress",v:`${pct(stats.total,2000)}%`,c:C.gold,sub:`${stats.total} of 2,000`},{l:"Screen Rate",v:`${pct(stats.screened,stats.total)}%`,c:C.purple,sub:`${stats.screened} screened`},{l:"Hire Rate",v:`${pct(stats.hired,stats.interviewed)}%`,c:C.green,sub:`${stats.hired} hired`},{l:"No Show Rate",v:`${pct(stats.noShows,stats.total)}%`,c:stats.noShows/Math.max(stats.total,1)>0.15?C.red:C.amber,sub:`${stats.noShows} ghosted`}].map(({l,v,c,sub})=>(
                  <div key={l} style={S.cardB(c,{padding:"12px 14px"})}>
                    <div style={S.label}>{l}</div>
                    <div style={{fontSize:26,fontWeight:900,color:c,lineHeight:1,marginBottom:2}}>{v}</div>
                    <div style={{fontSize:11,color:C.muted}}>{sub}</div>
                  </div>
                ))}
              </div>
              <div style={S.card()}>
                <div style={{fontWeight:700,color:C.gold,marginBottom:12,fontSize:12}}>📍 Market Health</div>
                {marketData.map(m=>(
                  <div key={m.market} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12}}>
                      <span style={{color:m.pctTarget<30?C.red:m.pctTarget>70?C.green:C.text}}>{m.market}</span>
                      <span style={{fontWeight:700,color:m.pctTarget<30?C.red:m.pctTarget>70?C.green:C.amber}}>{m.count}/{m.target}</span>
                    </div>
                    {S.bar(m.pctTarget, m.pctTarget<30?C.red:m.pctTarget>70?C.green:C.amber)}
                  </div>
                ))}
              </div>
              <button onClick={generatePlan} disabled={planLoading} style={S.btn(planLoading?C.surf2:C.gold,{padding:"13px",fontSize:14,borderRadius:10,opacity:planLoading?0.7:1})}>
                {planLoading?"⚡ Analyzing live data...":"⚡ Generate This Week's Plan"}
              </button>
              {plan && (
                <div style={S.cardB(C.gold,{background:C.surf2})}>
                  <div style={{fontWeight:700,color:C.gold,marginBottom:10,fontSize:12}}>📋 ACTION PLAN</div>
                  <pre style={{margin:0,whiteSpace:"pre-wrap",fontFamily:"inherit",fontSize:13,lineHeight:1.75}}>{plan}</pre>
                </div>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column"}}>
              <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>💬 Ask the Co-Pilot</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Reads your live data. Ask anything.</div>

                  const color=ok?C.green:bad?C.red:C.amber;
                  return <div key={l} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}}><span style={{color:C.muted}}>{l}</span><span style={{fontWeight:700,color}}>{r}% {ok?"✓":bad?"⚠":""}</span></div>
                    {S.bar(r,color)}
                  </div>;
                })}
              </div>
            </div>
            <div style={{...S.card(),marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:12}}>🗺️ Applicants by Market</div>
              {marketData.map(m=>(
                <div key={m.market} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}}><span>{m.market}</span><span style={{fontWeight:700,color:m.color}}>{m.count}/{m.target} ({m.pctTarget}%)</span></div>
                  {S.bar(m.pctTarget,m.color)}
                </div>
              ))}
            </div>
            <div style={S.card()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:12}}>📋 AI Weekly Report</div>
                <button onClick={generateReport} disabled={reportLoading} style={S.btn(reportLoading?C.surf2:C.gold,{fontSize:12,padding:"7px 16px"})}>
                  {reportLoading?"Generating...":"Generate Report"}
                </button>
              </div>
              {reportText ? <pre style={{margin:0,whiteSpace:"pre-wrap",fontFamily:"inherit",fontSize:13,lineHeight:1.8}}>{reportText}</pre>
                : <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"24px 0"}}>Hit Generate Report to get your AI weekly summary based on live data.</div>}
            </div>
          </div>
        )}
      </div>
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:${C.surf3};border-radius:10px}*{box-sizing:border-box}`}</style>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));root.render(React.createElement(App));</script></body></html>
